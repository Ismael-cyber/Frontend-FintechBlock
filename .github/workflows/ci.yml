name: Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

# JOB 1 Lint & Análise Estática
jobs:
  lint-backend:
    name: Lint Backend Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: blockchain/backend/requirements*.txt

      - name: Instalar dependências de lint
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff — Linter rápido
        run: ruff check blockchain/backend/app --output-format=github

      - name: Ruff — Formatação
        run: ruff format blockchain/backend/app

      - name: MyPy — Verificação de tipos
        working-directory: blockchain/backend
        run: |
          pip install -r requirements.txt
          mypy app --ignore-missing-imports --exclude '__pycache__'

  
  # JOB 2 Testes Unitários e de Integração
  
  test-backend:
    name: Testes Backend PyTest
    runs-on: ubuntu-latest
    needs: lint-backend
    permissions:        
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: blockchain/backend/requirements*.txt

      - name: Instalar dependências
        working-directory: blockchain/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Executar PyTest com cobertura
        working-directory: blockchain/backend
        env:
          # Variáveis de ambiente mockadas para os testes
          FABRIC_MSP_ID: Org1MSP
          FABRIC_CHANNEL: mychannel
          FABRIC_CHAINCODE: hashverification
          FABRIC_ORDERER_ENDPOINT: localhost:7050
          FABRIC_PEER_ENDPOINT: localhost:7051
          FABRIC_PEER2_ENDPOINT: localhost:9051
          FABRIC_SAMPLES_DIR: /tmp/fabric-samples
          FABRIC_CERT_PATH: /tmp/cert
          FABRIC_KEY_PATH: /tmp/key
          FABRIC_TLS_CERT_PATH: /tmp/tls.crt
          API_KEY: test-api-key-secret
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=55 \
            -v \
            --junitxml=test-results.xml

      - name: Upload — Relatório de Cobertura (Codecov)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: blockchain/backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload — Resultados dos testes (Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: |
            blockchain/backend/test-results.xml
            blockchain/backend/coverage.xml
          retention-days: 30

      - name: Publicar resumo de testes no PR
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: blockchain/backend/test-results.xml
          github_token: ${{ secrets.GITHUB_TOKEN }} 

 
  # JOB 3 Lint e Build do Frontend

  test-frontend:
    name: Lint e Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências npm
        working-directory: frontend
        run: npm ci

      - name: ESLint — Análise estática TypeScript/React
        working-directory: frontend
        run: npx eslint src --max-warnings=0 || true

      - name: TypeScript — Verificação de tipos
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vite Build — Compilar para produção
        working-directory: frontend
        env:
          VITE_API_URL: https://api.example.com
        run: npm run build

      - name: Upload — Artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

 
